name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: macOS
            runner: macos-latest
            build_cmd: npm run build:mac -- --publish never
            artifact_name: mac-build
          - os_name: Windows
            runner: windows-latest
            build_cmd: npm run build:win -- --publish never
            artifact_name: windows-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/**
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: release-assets/mac

      - name: Download windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-assets/windows

      - name: Create release tag
        id: tag
        run: |
          echo "tag=auto-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Automated Build ${{ github.run_number }}
          generate_release_notes: true
          prerelease: true
          files: |
            release-assets/mac/**
            release-assets/windows/**
